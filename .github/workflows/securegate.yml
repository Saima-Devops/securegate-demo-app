name: SecureGate AI Security Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  securegate-security-check:
    runs-on: ubuntu-latest

    env:
      SECUREGATE_URL: ${{ secrets.SECUREGATE_URL }}
      SECUREGATE_API_KEY: ${{ secrets.SECUREGATE_API_KEY }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate SecureGate AI URL
        run: |
          if [ -z "$SECUREGATE_URL" ]; then
            echo "SECUREGATE_URL GitHub secret is missing."
            exit 1
          fi

          if echo "$SECUREGATE_URL" | grep -Eq '\[|\]|\(|\)| '; then
            echo "SECUREGATE_URL is malformed."
            echo "Save it as a plain URL only, for example: https://citric-pliable-baggie.ngrok-free.dev"
            echo "Do not use Markdown format like [https://...](https://...)."
            exit 1
          fi

          case "$SECUREGATE_URL" in
            http://*|https://*) ;;
            *)
              echo "SECUREGATE_URL must start with http:// or https://"
              exit 1
              ;;
          esac

      - name: Start SecureGate AI scan
        id: securegate_start
        run: |
          RESPONSE=$(curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/pipeline/start" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"project_name\":\"${{ github.event.repository.name }}\",
              \"repository_url\":\"${{ github.server_url }}/${{ github.repository }}\",
              \"branch\":\"${{ github.ref_name }}\",
              \"commit_sha\":\"${{ github.sha }}\",
              \"pipeline_run_id\":\"${{ github.run_id }}\"
            }")

          echo "$RESPONSE"
          SCAN_ID=$(echo "$RESPONSE" | jq -r .scan_id)
          if [ -z "$SCAN_ID" ] || [ "$SCAN_ID" = "null" ]; then
            echo "SecureGate AI did not return a scan_id"
            exit 1
          fi
          echo "scan_id=$SCAN_ID" >> "$GITHUB_OUTPUT"

      - name: Run GitLeaks secret scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks-report.json \
            --no-git || true

          test -f gitleaks-report.json || echo "[]" > gitleaks-report.json

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-report.json
          exit-code: 0

      - name: Ensure Trivy filesystem report exists
        run: |
          test -f trivy-fs-report.json || echo '{"Results":[]}' > trivy-fs-report.json

      - name: Run SonarQube scan
        if: env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.exclusions=.github/workflows/securegate.yml,.github/workflows/securegate-ai.yml,SecureGate.Dockerfile

      - name: Fetch SonarQube quality gate and issues
        if: env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        run: |
          curl -sS \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "$SONAR_HOST_URL/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY&organization=$SONAR_ORGANIZATION" \
            -o sonar-gate.json

          curl -sS \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "$SONAR_HOST_URL/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&organization=$SONAR_ORGANIZATION&resolved=false&ps=500" \
            -o sonar-issues.json

          jq -n \
            --slurpfile gate sonar-gate.json \
            --slurpfile issues sonar-issues.json \
            '{projectStatus: $gate[0].projectStatus, issues: ($issues[0].issues // [])}' \
            > sonarqube-report.json

      - name: Create SonarQube placeholder report
        if: env.SONAR_HOST_URL == '' || env.SONAR_TOKEN == '' || env.SONAR_PROJECT_KEY == '' || env.SONAR_ORGANIZATION == ''
        run: |
          cat > sonarqube-report.json <<EOF
          {
            "projectStatus": {
              "status": "UNKNOWN"
            },
            "issues": []
          }
          EOF

      - name: Prepare Dockerfile when missing
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "Using repository Dockerfile."
            echo "path=Dockerfile" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No Dockerfile found. Creating SecureGate.Dockerfile for image scanning."
          echo "path=SecureGate.Dockerfile" >> "$GITHUB_OUTPUT"

          if [ -f package.json ]; then
            cat > SecureGate.Dockerfile <<'EOF'
          FROM node:24-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm install
          COPY . .
          CMD ["npm", "start"]
          EOF
          elif [ -f requirements.txt ]; then
            cat > SecureGate.Dockerfile <<'EOF'
          FROM python:3.12-alpine
          WORKDIR /app
          COPY requirements.txt ./
          RUN pip install --no-cache-dir --upgrade pip && pip install --no-cache-dir -r requirements.txt
          COPY . .
          CMD ["python", "app.py"]
          EOF
          else
            cat > SecureGate.Dockerfile <<'EOF'
          FROM alpine:3.20
          WORKDIR /app
          COPY . .
          CMD ["sh", "-c", "ls -la /app && sleep 30"]
          EOF
          fi

      - name: Build Docker image for image vulnerability scan
        id: image_build
        run: |
          IMAGE_NAMESPACE="${DOCKERHUB_USERNAME:-${{ github.repository_owner }}}"
          IMAGE_REPOSITORY="${{ github.event.repository.name }}"
          IMAGE_REPO=$(echo "$IMAGE_NAMESPACE/$IMAGE_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          IMAGE_SHA_REF="$IMAGE_REPO:${{ github.sha }}"
          IMAGE_LATEST_REF="$IMAGE_REPO:latest"

          echo "SecureGate AI Docker image path: $IMAGE_SHA_REF"
          echo "Docker Hub repository will be created automatically on first push when credentials allow it: $IMAGE_REPO"

          docker build -f "${{ steps.dockerfile.outputs.path }}" -t "$IMAGE_SHA_REF" .
          docker tag "$IMAGE_SHA_REF" "$IMAGE_LATEST_REF"

          echo "image_ref=$IMAGE_SHA_REF" >> "$GITHUB_OUTPUT"
          echo "latest_ref=$IMAGE_LATEST_REF" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image_build.outputs.image_ref }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Ensure Trivy image report exists
        run: |
          test -f trivy-image-report.json || echo '{"Results":[]}' > trivy-image-report.json

      - name: Upload GitLeaks report
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/${{ steps.securegate_start.outputs.scan_id }}/gitleaks" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @gitleaks-report.json

      - name: Upload Trivy filesystem report
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/${{ steps.securegate_start.outputs.scan_id }}/trivy-fs" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @trivy-fs-report.json

      - name: Upload Trivy image report
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/${{ steps.securegate_start.outputs.scan_id }}/trivy-image" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @trivy-image-report.json

      - name: Upload SonarQube report
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/${{ steps.securegate_start.outputs.scan_id }}/sonarqube" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @sonarqube-report.json

      - name: Check SecureGate AI deployment decision
        run: |
          RESPONSE=$(curl -fsS "${SECUREGATE_URL%/}/api/v1/scans/${{ steps.securegate_start.outputs.scan_id }}")
          echo "$RESPONSE"

          DECISION=$(echo "$RESPONSE" | jq -r .deployment_decision)
          SCORE=$(echo "$RESPONSE" | jq -r .security_score)
          SONAR_GATE=$(echo "$RESPONSE" | jq -r .sonar_quality_gate)
          FINDING_COUNTS=$(echo "$RESPONSE" | jq -c .finding_counts)
          TOOL_STATUS=$(echo "$RESPONSE" | jq -c .tool_status)

          echo "SecureGate AI Decision: $DECISION"
          echo "Security Score: $SCORE"
          echo "SonarQube Gate: $SONAR_GATE"
          echo "Finding Counts: $FINDING_COUNTS"
          echo "Tool Status: $TOOL_STATUS"

          if [ "$DECISION" != "APPROVED" ]; then
            echo "SecureGate AI rejected this build."
            if [ "$SONAR_GATE" != "OK" ] && [ "$SONAR_GATE" != "UNKNOWN" ]; then
              echo "Rejection reason: SonarQube quality gate is $SONAR_GATE. Check SonarCloud Quality Gate conditions."
            fi
            echo "Top findings causing/relevant to rejection:"
            echo "$RESPONSE" | jq -r '.findings[:10][] | "- [\(.tool)] \(.severity) \(.title) in \(.file // "N/A")"'
            exit 1
          fi

          echo "SecureGate AI approved this build."
          echo "The code is safe to deploy the Docker image and push it to Docker Hub."
          echo "Repository, filesystem, image, secrets, and Sonar quality checks passed SecureGate AI policy."

      - name: Push approved Docker image to Docker Hub when configured
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker push "${{ steps.image_build.outputs.image_ref }}"
          docker push "${{ steps.image_build.outputs.latest_ref }}"
          echo "Docker image pushed to Docker Hub:"
          echo "  ${{ steps.image_build.outputs.image_ref }}"
          echo "  ${{ steps.image_build.outputs.latest_ref }}"

      - name: Rescan pushed Docker image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image_build.outputs.image_ref }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Upload post-push image rescan to SecureGate AI
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/${{ steps.securegate_start.outputs.scan_id }}/trivy-image" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @trivy-image-report.json
          echo "Pushed Docker image was rescanned and SecureGate AI dashboard was updated."

      - name: Docker Hub push not configured
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: |
          echo "SecureGate AI approved this build, but Docker Hub push was skipped because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."

      - name: Complete SecureGate AI pipeline
        if: always() && steps.securegate_start.outputs.scan_id != ''
        run: |
          STATUS="SUCCESS"

          if [ "${{ job.status }}" != "success" ]; then
            STATUS="FAILED"
          fi

          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/pipeline/complete" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"scan_id\":\"${{ steps.securegate_start.outputs.scan_id }}\",
              \"status\":\"$STATUS\"
            }"
